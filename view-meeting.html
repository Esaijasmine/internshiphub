<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>View Meeting – InternshipHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ── RESET ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── PAGE BACKGROUND ────────────────────────────────── */
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      /* soft warm white — keeps the Figma white palette */
      background: #ffffff;
      overflow: hidden;
      position: relative;
    }

    /* ── FLOATING BLOBS (background depth) ─────────────── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: drift 12s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 {
      width: 500px; height: 500px;
      background: #faf1dc;          /* Figma cream */
      top: -120px; left: -120px;
      animation-delay: 0s;
    }
    .blob-2 {
      width: 400px; height: 400px;
      background: #284cb8;          /* Figma blue */
      bottom: -100px; right: -100px;
      opacity: 0.12;
      animation-delay: 3s;
    }
    .blob-3 {
      width: 280px; height: 280px;
      background: #faf1dc;
      bottom: 80px; left: 60px;
      animation-delay: 6s;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    /* ── FLOATING PARTICLES ─────────────────────────────── */
    #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: #284cb8;         /* Figma blue dots */
      opacity: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(1);   opacity: 0; }
      15%  { opacity: 0.18; }
      85%  { opacity: 0.12; }
      100% { transform: translateY(-100vh) scale(0.4); opacity: 0; }
    }

    /* ── CARD WRAPPER ───────────────────────────────────── */
    .card-wrap {
      position: relative;
      z-index: 10;
      animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* ── OUTER WHITE CARD ───────────────────────────────── */
    .outer-card {
      background: #ffffff;
      border-radius: 20px;
      width: 680px;
      max-width: 95vw;
      box-shadow:
        0 2px 6px rgba(40,76,184,0.06),
        0 12px 40px rgba(40,76,184,0.12),
        0 40px 80px rgba(0,0,0,0.08);
      position: relative;
      overflow: hidden;
      padding: 28px 28px 36px;
    }

    /* subtle top shimmer line */
    .outer-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #faf1dc 0%, #284cb8 50%, #faf1dc 100%);
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── CLOSE BUTTON ───────────────────────────────────── */
    .close-btn {
      position: absolute;
      top: 16px; right: 18px;
      width: 36px; height: 36px;
      border: none;
      background: rgba(229,57,53,0.08);
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      color: #e53935;               /* Figma close red */
      transition: background 0.2s, transform 0.2s;
      z-index: 5;
    }
    .close-btn:hover {
      background: rgba(229,57,53,0.18);
      transform: rotate(90deg) scale(1.1);
    }

    /* ── INNER CREAM CARD ───────────────────────────────── */
    .inner-card {
      background: #faf1dc;          /* Figma cream — unchanged */
      border-radius: 14px;
      padding: 36px 40px 40px;
      position: relative;
      overflow: hidden;
    }

    /* inner sparkle overlay */
    .inner-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 20% 0%, rgba(255,255,255,0.45) 0%, transparent 60%);
      pointer-events: none;
      border-radius: 14px;
    }

    /* ── TITLE ──────────────────────────────────────────── */
    .meeting-title {
      text-align: center;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 26px;
      color: #284cb8;               /* Figma blue — unchanged */
      margin-bottom: 32px;
      position: relative;
      letter-spacing: 0.3px;
      animation: fadeSlideDown 0.6s 0.3s both;
    }
    .meeting-title::after {
      content: '';
      display: block;
      width: 60px;
      height: 3px;
      background: #284cb8;
      border-radius: 2px;
      margin: 10px auto 0;
      animation: expandLine 0.6s 0.7s both;
      transform-origin: center;
    }
    @keyframes expandLine {
      from { transform: scaleX(0); opacity: 0; }
      to   { transform: scaleX(1); opacity: 1; }
    }
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── DETAIL ROWS ────────────────────────────────────── */
    .details { display: flex; flex-direction: column; gap: 0; position: relative; z-index: 1; }

    .detail-row {
      display: flex;
      align-items: flex-start;
      padding: 15px 0;
      border-bottom: 1px solid rgba(40,76,184,0.08);
      opacity: 0;
      transform: translateX(-18px);
      animation: rowIn 0.5s ease forwards;
      transition: background 0.2s;
      border-radius: 8px;
      padding-left: 6px; padding-right: 6px;
      cursor: default;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row:hover {
      background: rgba(255,255,255,0.55);
    }

    /* staggered row animations */
    .detail-row:nth-child(1) { animation-delay: 0.40s; }
    .detail-row:nth-child(2) { animation-delay: 0.52s; }
    .detail-row:nth-child(3) { animation-delay: 0.64s; }
    .detail-row:nth-child(4) { animation-delay: 0.76s; }
    .detail-row:nth-child(5) { animation-delay: 0.88s; }
    .detail-row:nth-child(6) { animation-delay: 1.00s; }

    @keyframes rowIn {
      to { opacity: 1; transform: translateX(0); }
    }

    /* row icon badge */
    .row-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: rgba(40,76,184,0.10);  /* tinted with Figma blue */
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      margin-right: 16px;
      margin-top: 2px;
      transition: background 0.2s, transform 0.2s;
    }
    .detail-row:hover .row-icon {
      background: rgba(40,76,184,0.18);
      transform: scale(1.08);
    }

    .detail-label {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 15px;
      color: #000000;               /* Figma black */
      width: 110px;
      flex-shrink: 0;
      padding-top: 3px;
    }

    .detail-value {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 15px;
      color: #000000;               /* Figma black */
      line-height: 1.55;
      flex: 1;
      padding-top: 3px;
    }

    /* highlight chip for specific values */
    .chip-blue {
      display: inline-block;
      background: rgba(40,76,184,0.09);
      color: #284cb8;
      border-radius: 20px;
      padding: 3px 12px;
      font-weight: 600;
      font-size: 13px;
    }
    .chip-orange {
      display: inline-block;
      background: rgba(250,241,220,0.9);
      color: #8a6a00;
      border: 1px solid rgba(210,174,96,0.5);
      border-radius: 20px;
      padding: 3px 12px;
      font-weight: 600;
      font-size: 13px;
    }

    /* ── FOOTER STRIP INSIDE INNER CARD ─────────────────── */
    .card-footer {
      margin-top: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      opacity: 0;
      animation: fadeUp 0.5s 1.2s both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .add-calendar-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #284cb8;          /* Figma blue */
      color: #ffffff;
      border: none;
      border-radius: 10px;
      padding: 11px 24px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 16px rgba(40,76,184,0.30);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .add-calendar-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      pointer-events: none;
    }
    .add-calendar-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(40,76,184,0.38);
    }
    .add-calendar-btn:active { transform: translateY(0); }

    /* ── TOAST NOTIFICATION ─────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #284cb8;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 12px 24px;
      border-radius: 30px;
      box-shadow: 0 6px 24px rgba(40,76,184,0.35);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <!-- Background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Floating particles canvas -->
  <canvas id="particles"></canvas>

  <!-- ═══ CARD ═══ -->
  <div class="card-wrap">
    <div class="outer-card">

      <!-- Close ✕ -->
      <button class="close-btn" id="closeBtn" title="Close">✕</button>

      <!-- Inner cream card — Figma #faf1dc -->
      <div class="inner-card">

        <!-- Title -->
        <h2 class="meeting-title">Meeting Scheduled</h2>

        <!-- Detail rows -->
        <div class="details">

          <div class="detail-row">
            <div class="row-icon">💼</div>
            <span class="detail-label">Position</span>
            <span class="detail-value">Web Developer</span>
          </div>

          <div class="detail-row">
            <div class="row-icon">🏢</div>
            <span class="detail-label">Company</span>
            <span class="detail-value">infotech Pvt Ltd</span>
          </div>

          <div class="detail-row">
            <div class="row-icon">📅</div>
            <span class="detail-label">Date</span>
            <span class="detail-value">
              <span class="chip-orange">28 Feb 2026</span>
            </span>
          </div>

          <div class="detail-row">
            <div class="row-icon">⏰</div>
            <span class="detail-label">Time</span>
            <span class="detail-value">
              <span class="chip-blue">10 AM</span>
            </span>
          </div>

          <div class="detail-row">
            <div class="row-icon">📡</div>
            <span class="detail-label">Mode</span>
            <span class="detail-value">Offline</span>
          </div>

          <div class="detail-row">
            <div class="row-icon">📍</div>
            <span class="detail-label">Location</span>
            <span class="detail-value">
              Chennai, Annanagar.<br>600040.
            </span>
          </div>

        </div>

        <!-- Footer action -->
        <div class="card-footer">
          <button class="add-calendar-btn" id="calBtn">
            📆 &nbsp;Add to Calendar
          </button>
        </div>

      </div><!-- /inner-card -->
    </div><!-- /outer-card -->
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">✅ Added to your calendar!</div>


  <script>
    /* ── PARTICLES ──────────────────────────────────────── */
    (function () {
      const canvas = document.getElementById('particles');
      const ctx = canvas.getContext('2d');
      let W, H, dots = [];

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      function randomDot() {
        return {
          x:    Math.random() * W,
          y:    H + Math.random() * 100,
          r:    1.5 + Math.random() * 2.5,
          speed:0.4 + Math.random() * 0.8,
          alpha:0,
          phase:Math.random() * Math.PI * 2
        };
      }

      for (let i = 0; i < 28; i++) {
        let d = randomDot();
        d.y = Math.random() * H; // spread on load
        dots.push(d);
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        dots.forEach((d, i) => {
          d.y -= d.speed;
          d.x += Math.sin(d.phase + d.y * 0.012) * 0.4;
          d.alpha = Math.min(0.18, d.alpha + 0.003);

          if (d.y < -10) { dots[i] = randomDot(); return; }

          ctx.beginPath();
          ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(40,76,184,${d.alpha})`;  /* Figma blue */
          ctx.fill();
        });
        requestAnimationFrame(draw);
      }
      draw();
    })();

    /* ── CLOSE BUTTON ───────────────────────────────────── */
     document.getElementById('closeBtn').addEventListener('click', function () {
  const wrap = document.querySelector('.card-wrap');

  // keep your animation
  wrap.style.transition = 'opacity 0.35s, transform 0.35s';
  wrap.style.opacity    = '0';
  wrap.style.transform  = 'scale(0.92) translateY(20px)';

  // after animation → go to dashboard
  setTimeout(() => {
    window.location.href = "stu-dashboard.html";
  }, 400);
});
    /* ── ADD TO CALENDAR (demo) ─────────────────────────── */
    document.getElementById('calBtn').addEventListener('click', function () {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    });

    /* ── ROW HOVER PULSE ────────────────────────────────── */
    document.querySelectorAll('.detail-row').forEach(row => {
      row.addEventListener('mouseenter', () => {
        row.style.paddingLeft  = '14px';
        row.style.transition   = 'padding 0.2s, background 0.2s';
      });
      row.addEventListener('mouseleave', () => {
        row.style.paddingLeft = '6px';
      });
    });
  </script>
</body>
</html>
