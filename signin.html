<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InternshipHub Signup</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --primary: #3C64DE;
    --primary-dark: #2e52c7;
    --text: #1c1f30;
    --muted: rgba(28, 31, 48, 0.75);
    --card-bg: rgba(255, 255, 255, 0.65);
    --overlay: rgba(0, 0, 0, 0.2);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background-image: url('defaultimg.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    color: var(--text);
    min-height: 100vh;
    position: relative;
    transition: background-image 0.5s ease-in-out;
    scroll-behavior: smooth;
}

/* Overlay */
body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--overlay);
    z-index: 0;
}

.top-bar {
    background: var(--primary);
    color: #fff;
    text-align: center;
    padding: 14px;
    font-size: 18px;
    font-weight: 600;
    position: relative;
    z-index: 1;
}

.header {
    padding: 16px 24px;
    font-size: 28px;
    font-weight: 700;
    background: #F5F5F5;
    position: relative;
    z-index: 1;
}

.container {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: flex-start;
    padding: 40px 60px 40px 80px;
}

.form-section {
    width: 100%;
    max-width: 420px;
}

.form-card {
    position: relative;
    background: var(--card-bg);
    border-radius: 28px;
    padding: 30px 24px;
    backdrop-filter: blur(20px);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
    overflow: hidden;
    transform: translateY(20px);
    animation: slideUp 0.8s ease-out forwards;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.form-card:hover {
    transform: translateY(0) scale(1.01);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
}

.form-card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 28px;
    background: linear-gradient(120deg, rgba(255,255,255,0.25), rgba(255,255,255,0));
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
}

.form-card:hover::before {
    opacity: 1;
}

@keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

@keyframes pop {
    0% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-6px) scale(1.01); }
    100% { transform: translateY(0) scale(1); }
}

.form-card.role-changed {
    animation: pop 0.5s ease;
}

.form-title {
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 18px;
    letter-spacing: 0.3px;
}

.tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 18px;
    padding: 6px;
    background: rgba(255,255,255,0.5);
    border-radius: 999px;
    position: relative;
}

.tab {
    padding: 10px 16px;
    border-radius: 999px;
    cursor: pointer;
    font-weight: 600;
    color: var(--muted);
    position: relative;
    transition: transform 0.2s ease, filter 0.2s ease, color 0.2s ease;
}

.tab:hover {
    transform: translateY(-1px);
    filter: brightness(1.05);
}

.tab.active {
    background: #fff;
    color: var(--text);
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

.form-group {
    margin-bottom: 14px;
}

label {
    font-weight: 600;
    margin-bottom: 6px;
    display: block;
}

.input-box {
    position: relative;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid rgba(0,0,0,0.2);
    outline: none;
    transition: border-color 0.25s ease, box-shadow 0.25s ease;
}

input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px rgba(60,100,222,0.2);
}

.icon {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: rgba(0,0,0,0.5);
    transition: transform 0.2s ease, color 0.2s ease;
}

.icon:hover {
    transform: translateY(-50%) scale(1.05);
    color: rgba(0,0,0,0.7);
}

.btn {
    position: relative;
    overflow: hidden;
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(120deg, var(--primary), var(--primary-dark));
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 25px rgba(0,0,0,0.2);
}

.btn:active {
    transform: translateY(0) scale(0.98);
}

.btn::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    width: 10px;
    height: 10px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
    transition: transform 0.4s ease, opacity 0.4s ease;
    pointer-events: none;
}

.btn:active::after {
    transform: translate(-50%, -50%) scale(18);
    opacity: 1;
    transition: transform 0.4s ease, opacity 0.4s ease;
}

.footer {
    text-align: center;
    font-size: 13px;
    margin-top: 12px;
}

.login-link {
    color: var(--primary);
    font-weight: 700;
    cursor: pointer;
    transition: filter 0.2s ease;
}

.login-link:hover {
    filter: brightness(1.1);
}
</style>
</head>

<body>

<div class="top-bar">Upskill and land your Dream Career</div>
<div class="header">InternshipHub</div>

<div class="container">
    <div class="form-section">
        <div class="form-card">

            <div class="form-title">Candidate Sign Up</div>

            <div class="tabs">
                <div class="tab active" onclick="selectRole(this)">Student</div>
                <div class="tab" onclick="selectRole(this)">Admin</div>
                <div class="tab" onclick="selectRole(this)">Industry</div>
            </div>

            <div class="form-group">
                <label>Name</label>
                <div class="input-box">
                    <input type="text" id="name" placeholder="Enter your name">
                    <span class="icon"><i class="fas fa-user"></i></span>
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <div class="input-box">
                    <input type="email" id="email" placeholder="Enter your email">
                    <span class="icon"><i class="fas fa-envelope"></i></span>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-box">
                    <input type="password" id="password" placeholder="Password">
                    <span class="icon" onclick="togglePassword('password')">
                        <i class="fas fa-eye"></i>
                    </span>
                </div>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-box">
                    <input type="password" id="confirmPassword" placeholder="Confirm Password">
                    <span class="icon" onclick="togglePassword('confirmPassword')">
                        <i class="fas fa-eye"></i>
                    </span>
                </div>
            </div>

            <button class="btn" onclick="submitForm()">Register</button>

            <div class="footer">
                By continuing, you agree to our terms & conditions
            </div>

            <div class="footer">
                Already registered?
                <span class="login-link" onclick="goToLogin()">Login</span>
            </div>

        </div>
    </div>
</div>

<script>
function selectRole(el) {
    document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
    el.classList.add('active');

    const role = el.textContent.trim();
    const title = document.querySelector('.form-title');
    if (title) {
        title.textContent = `${role} Sign Up`;
    }

    const body = document.body;
    if (role === "Student") {
        body.style.backgroundImage = "url('img1.png')";
    } else if (role === "Admin") {
        body.style.backgroundImage = "url('admimg2.png')";
    } else if (role === "Industry") {
        body.style.backgroundImage = "url('indusimg2.png')";
    }

    const card = document.querySelector('.form-card');
    if (card) {
        card.classList.add('role-changed');
        setTimeout(() => card.classList.remove('role-changed'), 520);
    }
}

function togglePassword(id) {
    let input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}

async function submitForm() {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("password").value.trim();
    const confirm = document.getElementById("confirmPassword").value.trim();
    const role = document.querySelector('.tab.active').textContent.trim();

    if (!name || !email || !pass || !confirm) {
        alert("Please fill all fields!");
        return;
    }

    if (pass !== confirm) {
        alert("Passwords do not match!");
        return;
    }

    const response = await fetch('http://localhost:3000/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password: pass, role })
    });

    const result = await response.json();

    if (result.success) {
        alert("Signup Successful!");
        window.location.href = "logs.html";
    } else {
        alert(result.message);
    }
}

function goToLogin() {
    window.location.href = "logs.html";
}
</script>

</body>
</html>
