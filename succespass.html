<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InternshipHub - Reset Success</title>

<style>
:root {
    --primary: #3C64DE;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    background: url('fgirl4.png') center/cover no-repeat;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* ===== GLASS HEADER ===== */
.header {
    padding: 15px 30px;
    font-size: 26px;
    font-weight: bold;

    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);

    border-bottom: 1px solid rgba(255,255,255,0.3);
}

/* Layout */
.container {
    flex: 1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 60px;
}

/* Left Image */
.left img {
    width: 550px;
    max-width: 100%;
}

/* Card */
.card {
    width: 400px;
    padding: 40px 30px;
    border-radius: 15px;
    text-align: center;

    background: white;

    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

/* Icon */
.check-icon {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 6px solid #3cb043;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
}

.check-icon::after {
    content: "✔";
    font-size: 50px;
    color: #3cb043;
}

/* Text */
.card h2 {
    color: var(--primary);
    margin-bottom: 20px;
}

.card p {
    font-size: 18px;
    color: #222;
    margin-bottom: 30px;
}

/* Button */
.btn {
    background: rgba(60, 100, 222, 0.85);
    color: white;
    border: none;
    padding: 12px 30px;
    font-size: 18px;
    border-radius: 8px;
    cursor: pointer;

    backdrop-filter: blur(5px);
    transition: all 0.3s ease;
}

.btn:hover {
    background: #3C64DE;
    box-shadow: 0 0 15px rgba(60, 100, 222, 0.6);
    transform: translateY(-2px);
}

/* Footer */
.footer {
    text-align: center;
    padding: 10px;
    font-size: 18px;
}

/* Responsive */
@media(max-width: 900px){
    .container {
        flex-direction: column;
        gap: 30px;
        padding: 20px;
    }

    .left img {
        width: 350px;
    }
}
</style>
</head>

<body>

<div class="header">InternshipHub</div>

<div class="container">
    
    <div class="left">
        <img src="reset-image.png" alt="">
    </div>

    <div class="card">
        <div class="check-icon"></div>
        <h2>Password reset Successful</h2>
        <p>
            The password for your account has been changed.
            Now you can login with your account.
        </p>
        <button class="btn" onclick="goToLogin()">Go to Login</button>
    </div>

</div>

<div class="footer">
    © 2026 InternshipHub | All rights reserved
</div>

<script>
function goToLogin() {
    window.location.href = "logs.html";
}
</script>

</body>
</html>
