<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InternshipHub - Forgot Password</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: url('fgirl.png') no-repeat center/cover fixed;
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 20% 50%, rgba(0, 0, 0, 0.05) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(0, 0, 0, 0.03) 0%, transparent 50%);
      pointer-events: none;
    }

    header {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      padding: 20px 40px;
      font-size: 28px;
      font-weight: 700;
      color: white;
      letter-spacing: 0.5px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
      z-index: 10;
    }

    .container {
      flex: 1;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 40px 80px 40px 20px;
      position: relative;
      z-index: 5;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      padding: 50px 40px;
      border-radius: 20px;
      width: 420px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3),
                  0 0 1px rgba(255, 255, 255, 0.5) inset;
      border: 1px solid rgba(255, 255, 255, 0.6);
      animation: slideInUp 0.6s ease-out;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4),
                  0 0 1px rgba(255, 255, 255, 0.5) inset;
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .lock {
      font-size: 60px;
      margin-bottom: 20px;
      display: inline-block;
      animation: bounce 0.6s ease-out;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    .card h2 {
      color: #667eea;
      margin-bottom: 12px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .card p {
      margin-bottom: 30px;
      color: #555;
      font-size: 14px;
      line-height: 1.6;
    }

    .input-group {
      text-align: left;
      margin-bottom: 25px;
      position: relative;
    }

    .input-group label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
      color: #333;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 2px solid #e0e0e0;
      outline: none;
      font-size: 15px;
      background: rgba(255, 255, 255, 0.8);
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .input-group input::placeholder {
      color: #999;
    }

    .input-group input:focus {
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1),
                  0 4px 12px rgba(102, 126, 234, 0.2);
    }

    .btn {
      width: 100%;
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 15px;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn:active::before {
      width: 300px;
      height: 300px;
    }

    .send-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.35);
    }

    .send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(102, 126, 234, 0.45);
    }

    .send-btn:active {
      transform: translateY(0);
    }

    .back-btn {
      background: transparent;
      color: #28a745;
      border: 2px solid #28a745;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      background: rgba(40, 167, 69, 0.1);
      transform: translateX(-3px);
    }

    .back-btn:active {
      transform: translateX(-1px);
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      position: relative;
      z-index: 10;
    }
  </style>

</head>
<body>

  <header>InternshipHub</header>

  <div class="container">
    <div class="card">
      <div class="lock">🔒</div>
      <h2>Forget your Password?</h2>
      <p>No worries Enter email address and we’ll send you a OTP</p>

      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter your Email" />
      </div>

      <button class="btn send-btn" onclick="sendCode()">Send Code</button>
      <button class="btn back-btn" onclick="goBack()">↩ Back to login</button>
    </div>
  </div>

  <footer>© 2026 InternshipHub | All rights reserved</footer>

  <script>
    function sendCode() {
      const email = document.getElementById("email").value;
      if (!email) {
        alert("Please enter your email");
        return;
      }

      // Redirect to OTP reset screen
      window.location.href = "resetotp.html";
    }

    function goBack() {
      // Redirect to login page
      window.location.href = "login.html";
    }
  </script>

</body>
</html>
