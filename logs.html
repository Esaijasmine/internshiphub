<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InternshipHub Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --primary: #3C64DE;
    --primary-dark: #2e52c7;
    --text: #1c1f30;
    --muted: rgba(28, 31, 48, 0.65);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;

    background-image: url('log3.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    color: var(--text);
    min-height: 100vh;
    position: relative;
    transition: background-image 0.5s ease;
}

body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.25);
    z-index: 0;
}

.container {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 32px;
}

.form-card {
    width: min(420px, 100%);
    background: rgba(255, 255, 255, 0.8);
    border-radius: 28px;
    padding: 32px 28px;
    backdrop-filter: blur(16px);
    box-shadow: 0 18px 50px rgba(0, 0, 0, 0.24);
}

.form-title {
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 18px;
}

.tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 18px;
    padding: 8px;
    background: rgba(255, 255, 255, 0.65);
    border-radius: 999px;
}

.tab {
    padding: 10px 16px;
    border-radius: 999px;
    cursor: pointer;
    font-weight: 600;
    color: var(--muted);
    user-select: none;
    transition: background 0.2s ease, color 0.2s ease;
}

.tab.active {
    background: rgba(255, 255, 255, 1);
    color: var(--text);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
}

.form-group {
    margin-bottom: 14px;
}

label {
    font-weight: 600;
    margin-bottom: 6px;
    display: block;
}

.input-box {
    position: relative;
}

input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid rgba(0, 0, 0, 0.18);
    outline: none;
    font-size: 15px;
}

input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px rgba(60, 100, 222, 0.2);
}

.icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: rgba(0, 0, 0, 0.45);
}

.forget {
    font-size: 14px;
    color: var(--primary);
    text-align: right;
    display: block;
    margin-top: 4px;
    text-decoration: none;
    font-weight: 600;
}

.forget:hover {
    text-decoration: underline;
}

.btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(120deg, var(--primary), var(--primary-dark));
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    margin-top: 14px;
    font-size: 15px;
}

.footer {
    text-align: center;
    font-size: 13px;
    margin-top: 14px;
}

.login-link {
    color: var(--primary);
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
}

.login-link:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">
    <div class="form-card">
        <div class="form-title">Log in to InternshipHub</div>

        <div class="tabs">
            <div class="tab active" data-role="Student" onclick="selectRole(this)">Student</div>
            <div class="tab" data-role="Admin" onclick="selectRole(this)">Admin</div>
            <div class="tab" data-role="Industry" onclick="selectRole(this)">Industry</div>
        </div>

        <div class="form-group">
            <label>Email</label>
            <div class="input-box">
                <input id="email" type="email" placeholder="Enter your email">
                <span class="icon"><i class="fas fa-envelope"></i></span>
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="input-box">
                <input id="password" type="password" placeholder="Enter your password">
                <span class="icon" onclick="togglePassword()"><i class="fas fa-eye"></i></span>
            </div>

            <!-- ✅ UPDATED HERE -->
            <a href="forgotpass.html" class="forget">Forget Password?</a>
        </div>

        <button class="btn" onclick="submitLogin()">Log In</button>

        <div class="footer">
            New to InternshipHub? <a class="login-link" href="signin.html">Register</a>
        </div>
    </div>
</div>

<script>
let selectedRole = 'Student';

function selectRole(elem) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    elem.classList.add('active');
    selectedRole = elem.dataset.role;

    const backgroundMap = {
        'Student': 'log3.jpg',
        'Admin': 'log1.png',
        'Industry': 'log2.jpg'
    };

    document.body.style.backgroundImage = `url('${backgroundMap[selectedRole]}')`;
}

function togglePassword() {
    const input = document.getElementById('password');
    const icon = document.querySelector('.icon i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}

async function submitLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const role = selectedRole;

    if (!email || !password) {
        alert('Please fill in both email and password.');
        return;
    }

    const response = await fetch('http://localhost:3000/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, role })
    });

    const result = await response.json();

    if (result.success) {
        localStorage.setItem('loggedInUser', JSON.stringify(result));
        alert(`Welcome back, ${result.name}!`);
        
        if (role === 'Student') {
    window.location.href = 'stu-dashboard.html';
} else if (role === 'Admin') {
    window.location.href = 'admin-dashboard.html';
} else if (role === 'Industry') {
    window.location.href = 'industry-dashboard.html';
}

    } else {
        alert(result.message);
    }
}
</script>

</body>
</html>
